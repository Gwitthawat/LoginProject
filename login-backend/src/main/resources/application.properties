spring.application.name=login-backend

# Database Connect
spring.datasource.url=jdbc:postgresql://localhost:5432/login_db
spring.datasource.username=jdbc:postgresql
spring.datasource.password=1109

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=mySecretKeyLoginSystem123456789
jwt.expiration=86400000
